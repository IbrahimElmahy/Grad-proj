<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVMS | Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 20%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 250px 1fr;
            height: 100%;
        }

        .sidebar {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-right: var(--glass-border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 3rem;
            letter-spacing: -0.025em;
        }

        .nav-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
        }

        .main-content {
            padding: 2rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: var(--glass-border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-title {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }

        .recent-section {
            background: var(--card-bg);
            border: var(--glass-border);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .section-title {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        .placeholder-box {
            height: 200px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">RVMS</div>
            <div class="nav-item active">Dashboard</div>
            <a href="{% url 'upload_inspection' %}" class="nav-item">New Inspection</a>
            <div class="nav-item">Inspections</div>
            <div class="nav-item">Reports</div>
            <div class="nav-item">Settings</div>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Overview</h1>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    {{ status }}
                </div>
            </div>

            <div class="grid">
                <div class="card">
                    <div class="card-title">Total Inspections</div>
                    <p class="card-value">{{ inspections_count }}</p>
                </div>
                <div class="card">
                    <div class="card-title">Risks Detected</div>
                    <p class="card-value" style="color: var(--accent-red)">{{ risks_detected }}</p>
                </div>
                <div class="card">
                    <div class="card-title">Active AI Models</div>
                    <p class="card-value">1</p>
                </div>
            </div>

            <div class="recent-section">
                <h2 class="section-title">Runway Status Map</h2>
                <div class="placeholder-box">
                    Runway Visualization Placeholder (Waiting for Image Data)
                </div>
            </div>
        </main>
    </div>
</body>

</html>
