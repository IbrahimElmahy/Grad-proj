{% extends 'dashboard/base.html' %}

{% block title %}Reports{% endblock %}

{% block extra_css %}
<style>
    .card {
        max-width: 600px;
    }

    h1 {
        margin-top: 0;
        margin-bottom: 1.5rem;
    }

    p {
        color: var(--text-secondary);
        margin-bottom: 2rem;
    }

    .btn-download {
        background: var(--accent-green);
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: opacity 0.2s;
    }

    .btn-download:hover {
        opacity: 0.9;
    }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <h1>Export Data</h1>
    <p>Download a complete log of all inspections, including risk assessments, timestamps, and camera IDs in CSV format.
    </p>

    <a href="/export/" class="btn-download">
        Download CSV Report
    </a>
</div>
{% endblock %}
